<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadGuard AI - Smart City Command Center</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <!-- 3D Background Container -->
    <div id="three-canvas-container"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar glass-panel">
        <div class="brand">
            <i class="fa-solid fa-cube"></i> RoadGuard AI
        </div>
        <ul class="sidebar-nav">
            <li class="mt-2 mb-2 ps-3 text-uppercase" style="font-size: 0.7rem; color: #6B7280; font-weight: 600;">Main Menu</li>
            <li>
                <a href="/">
                    <i class="fa-solid fa-house"></i> Home / Landing
                </a>
            </li>
            <li>
                <a href="/live_cam" class="{% if request.path == '/live_cam' %}active{% endif %}">
                    <i class="fa-solid fa-video"></i> Setup & Live Cam
                </a>
            </li>
            <li>
                <a href="/map" class="{% if request.path == '/map' %}active{% endif %}">
                    <i class="fa-solid fa-map-location-dot"></i> Live Trip Tracking
                </a>
            </li>
            <li class="mt-4 mb-2 ps-3 text-uppercase" style="font-size: 0.7rem; color: #6B7280; font-weight: 600;">Analytics</li>
            <li>
                <a href="/trip_stats" class="{% if request.path == '/trip_stats' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i> Historical Analytics
                </a>
            </li>
        </ul>
        <div class="credits">
            <span class="fw-bold text-white d-block mb-1">Development Team</span>
            Asmi, Sneha & Anushka<br>
            <span style="font-size: 0.65rem; opacity: 0.6;">Version 2.0.1 (YOLOv12 Core)</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="{{ url_for('static', filename='js/three_bg.js') }}"></script>
    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
