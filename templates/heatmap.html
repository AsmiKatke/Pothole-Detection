{% extends "base.html" %}

{% block content %}
<div class="container-fluid h-100 d-flex flex-column">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-6 fw-bold text-white mb-2">Geospatial Heatmap</h1>
                <p class="text-white-50 mb-0">Live interactive plotting via Firebase integration</p>
            </div>
            <div class="d-flex gap-2">
                <span class="badge" style="background: var(--primary-pink); padding: 8px 12px;">High Severity</span>
                <span class="badge bg-secondary" style="padding: 8px 12px;">Low Severity</span>
            </div>
        </div>
    </div>

    <div class="row flex-grow-1">
        <div class="col-12 h-100">
            <div class="glass-panel p-2 h-100 position-relative">
                <div id="map"></div>
                
                <!-- Floating Info Card over map -->
                <div class="glass-panel p-3 position-absolute" style="bottom: 30px; left: 30px; z-index: 1000; max-width: 300px; background: rgba(11, 12, 16, 0.8);">
                    <h6 class="text-white border-bottom border-secondary pb-2 mb-3"><i class="fa-solid fa-layer-group text-pink me-2"></i>Map Layers</h6>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked" checked>
                        <label class="form-check-label text-white-50 small" for="flexSwitchCheckChecked">Heatmap Intensity</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="switch2" checked>
                        <label class="form-check-label text-white-50 small" for="switch2">Live Citzen Reports</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Leaflet Heatmap Plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Map (Default: University / City Center coordinates)
        var map = L.map('map', {
            zoomControl: false // custom position later if needed
        }).setView([18.5204, 73.8567], 14); // Pune coordinates as example
        
        L.control.zoom({ position: 'topright' }).addTo(map);

        // CartoDB Dark Matter Tile Layer (Replica Vibe)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Custom Markers
        var pinkIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#FF4B72; width:12px; height:12px; border-radius:50%; box-shadow: 0 0 10px #FF4B72; border: 2px solid white;'></div>",
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });

        // Mock coordinates for potholes (lat, lng, intensity)
        var addressPoints = [
            [18.5204, 73.8567, 1], // Center
            [18.5220, 73.8550, 0.8],
            [18.5180, 73.8580, 0.9],
            [18.5300, 73.8600, 0.5],
            [18.5250, 73.8400, 0.7],
            // Cluster
            [18.5150, 73.8300, 1],
            [18.5155, 73.8310, 0.9],
            [18.5145, 73.8305, 1],
        ];

        var heat = L.heatLayer(addressPoints, {
            radius: 25,
            blur: 15,
            maxZoom: 17,
            gradient: {0.4: '#1F2937', 0.6: '#4B5563', 0.8: '#E0E2E6', 1.0: '#FF4B72'}
        }).addTo(map);

        // Add high severity markers
        L.marker([18.5204, 73.8567], {icon: pinkIcon}).addTo(map)
            .bindPopup("<div style='background: #0B0C10; color: white; border: 1px solid #FF4B72; padding: 10px; border-radius: 8px;'><b style='color:#FF4B72;'>CRITICAL</b><br>Deep crater detected.<br><small class='text-secondary'>Reported via Command Center</small></div>");
            
        /* 
        ========================================================
        FIREBASE INTEGRATION (Frontend Placeholder Logic)
        ========================================================
        To populate this map from Firebase Firestore:
        
        db.collection("potholes").onSnapshot((querySnapshot) => {
            // 1. Clear existing layers if necessary
            
            let firePoints = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Add to heatmap array
                firePoints.push([data.lat, data.lng, data.severityScore]);
                
                // Add marker if high severity
                if(data.severity === "High") {
                    L.marker([data.lat, data.lng], {icon: pinkIcon}).addTo(map);
                }
            });
            
            // Re-render heatmap
            heat.setLatLngs(firePoints);
        });
        ========================================================
        */
    });
</script>

<style>
    /* Custom popup styling to override Leaflet default white */
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
        background: #0B0C10;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .leaflet-popup-content { margin: 0; }
    .leaflet-container a.leaflet-popup-close-button { color: #E0E2E6; }
</style>
{% endblock %}
