{% extends "base.html" %}

{% block content %}
<div class="container-fluid h-100 d-flex flex-column">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-end">
            <div>
                <h1 class="display-6 fw-bold text-white mb-2">Command Center</h1>
                <p class="text-white-50 mb-0">Live YOLOv12 Computer Vision Stream</p>
            </div>
            <div class="text-end">
                <span class="badge bg-danger blink px-3 py-2"><i class="fa-solid fa-circle text-white me-2" style="font-size: 0.5rem;"></i>REC</span>
                <p class="text-white-50 small mt-2 mb-0 font-monospace" id="sysTime">00:00:00</p>
            </div>
        </div>
    </div>

    <div class="row flex-grow-1">
        <div class="col-12 h-100">
            <!-- Full Width Immersive Video Container -->
            <div class="glass-panel p-0 h-100" style="position: relative;">
                
                <div class="video-container" style="height: 65vh; border: none; border-radius: 0;">
                    <img id="videoStream" src="{{ url_for('video_feed') }}" alt="Live YOLOv12 Feed" onerror="this.onerror=null; this.src=''; this.alt='Feed offline.';">
                </div>

                <!-- HUD OVERLAY (Replica Vibe) -->
                <div class="hud-overlay">
                    <!-- Top HUD -->
                    <div class="d-flex justify-content-between w-100">
                        <div class="hud-element text-info">
                            <i class="fa-solid fa-satellite-dish me-2"></i>FEED: CAM-01 (MAIN ST)
                        </div>
                        <div class="hud-element text-warning">
                            <i class="fa-solid fa-microchip me-2"></i>MODEL: YOLOv12-TINY
                        </div>
                    </div>

                    <!-- Bottom HUD -->
                    <div class="d-flex justify-content-between w-100 align-items-end">
                        <div class="d-flex flex-column gap-2">
                            <div class="hud-element text-white">
                                <i class="fa-solid fa-gauge-high text-pink me-2"></i>FPS: <span id="fpsCounter" class="fw-bold">--</span>
                            </div>
                            <div class="hud-element text-white">
                                <i class="fa-solid fa-location-crosshairs text-success me-2"></i>LOC: <span id="liveCoords">WAITING FOR GPS...</span>
                            </div>
                        </div>

                        <div class="hud-element text-danger" style="background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.3);">
                            <i class="fa-solid fa-triangle-exclamation blink me-2"></i>SEVERITY: <span id="severityLevel">SCANNING</span>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes blink { 50% { opacity: 0.2; } }
    .blink { animation: blink 1.5s infinite; }
</style>

<script>
    // Real-time Clock
    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Mock FPS
    setInterval(() => {
        document.getElementById('fpsCounter').innerText = Math.floor(Math.random() * 10) + 25;
    }, 500);

    // Mock Severity Scanner
    setInterval(() => {
        const levels = ['SCANNING', 'LOW', 'MEDIUM', 'HIGH (CRITICAL)'];
        const colors = ['text-white', 'text-info', 'text-warning', 'text-danger'];
        const rand = Math.floor(Math.random() * 10);
        
        let idx = 0;
        if(rand > 8) idx = 3;
        else if(rand > 6) idx = 2;
        else if(rand > 4) idx = 1;

        const sevEl = document.getElementById('severityLevel');
        sevEl.innerText = levels[idx];
        sevEl.className = `fw-bold ${colors[idx]}`;
    }, 2500);

    // HTML5 Geolocation Tracking for HUD and Backend
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            document.getElementById('liveCoords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            
            // Send live coordinates to the Flask backend
            fetch('/update_location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: lat, lng: lng }),
            }).catch(e => console.log(e));
            
        }, (error) => {
            document.getElementById('liveCoords').innerText = "GPS DENIED";
            document.getElementById('liveCoords').classList.replace('text-success', 'text-danger');
        }, { enableHighAccuracy: true });
    }
</script>
{% endblock %}
